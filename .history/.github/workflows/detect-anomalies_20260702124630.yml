# .github/workflows/detect-anomalies.yml
name: Detect CI Anomalies

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:
  detect-ai:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use default GITHUB_TOKEN which has write_permission by default in workflows
          persist-credentials: "true"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib requests numpy matplotlib

      - name: Fetch latest metrics from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python scripts/fetch_metrics.py

      - name: Train model on all fetched data
        id: train-model
        run: |
          echo "Training/retraining model on all fetched data..."
          
          # If the database has no table (fresh install), we need to create it first or handle error gracefully.
          if python -c "import sqlite3; conn = sqlite3.connect('data/metrics.db'); c = conn.cursor(); c.execute('SELECT name FROM sqlite_master WHERE type=\"table\"'); print(any(t[0]=='workflow_runs' for t in c.fetchall()))" 2>/dev/null | grep -q false; then
            echo "Creating empty database table structure..."
            python -c "import sqlite3; conn = sqlite3.connect('data/metrics.db'); conn.execute('CREATE TABLE IF NOT EXISTS workflow_runs (run_id INTEGER PRIMARY KEY, name TEXT, status TEXT, conclusion TEXT, event TEXT, branch TEXT, created_at TEXT, duration_seconds INTEGER, html_url TEXT)'); conn.commit(); print('Table ensured.');"
          fi
          
          python scripts/train_model.py || true

      - name: Detect Anomalies in Latest Run
        id: detection  
        run: |
          if [ ! -f data/model.joblib ]; then
            echo "Model training failed or produced no model. Skipping anomaly detection." 78|
            touch data/latest_detection.json # Prevent errors downstream
            exit 0
          fi
          
          # Only try detection if there's actual data
          record_count=$(python -c "import sqlite3; conn = sqlite3.connect('data/metrics.db'); print(conn.execute('SELECT count(*) FROM workflow_runs').next()[0])" 2>/dev/null || echo "0")
          if [ "$record_count" -gt 0 ]; then
            python scripts/detect_latest_run.py || true
          else
            echo "No records in database, skipping detection."
            echo '{"is_anomaly": false}' > data/latest_detection.json
          fi
          
      - name: Handle Anomaly Warning
        if: always()
        run: |
          python << 'EOF'
          import json
          try:
              with open('data/latest_detection.json') as f:
                  res = json.load(f)
              
              if res.get('is_anomaly'):
                  print(f"::error title=Anomaly Detected::CI Run {res['run_id']} is anomalous (Score: {res['anomaly_score']:.4f})")
              else:
                  print("Latest run appears normal.")
          except FileNotFoundError:
              print("Detection file not found, skipping warning.")
          EOF

      - name: Commit and push updated dashboard data
        if: github.event.workflow_run.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if there are changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No data changes to commit."
            exit 0
          fi
          
          # Remove the push command from here for now - we'll test locally first
          git add data/
          git commit -m "🔄 Auto-update dashboard data" || echo "Nothing to commit"

      - name: List committed files (debug)
        run: |
          echo "Contents of data directory:"
          ls -la data/
          echo ""
          echo "Git status:"
          git status