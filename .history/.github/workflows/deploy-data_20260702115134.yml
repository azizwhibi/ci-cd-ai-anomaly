# .github/workflows/deploy-data.yml
name: Deploy Dashboard Data

on:
  workflow_run:
    workflows: ["Collect Synthetic Metrics", "Detect CI Anomalies"]
    types: [completed]
    branches: [main]

jobs:
  deploy-data:
    runs-on: ubuntu-latest
    # Simpler condition: just check if the triggering workflow succeeded or was cancelled (for fresh data)
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      (github.event.workflow_run.conclusion == 'cancelled' && false)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download metrics database artifact
        uses: actions/download-artifact@v4
        with:
          name: full-dashboard-data
          path: downloaded-data
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download scored dashboard data artifact
        uses: actions/download-artifact@v4
        with:
          name: scored-dashboard-data
          path: downloaded-scored-data
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download metrics DB from detect-anomalies
        uses: actions/download-artifact@v4
        with:
          name: metrics-db
          path: downloaded-metrics-db
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true
        if: github.event.workflow_run.name == 'Detect CI Anomalies'

      - name: Copy latest data to correct locations
        run: |
          echo "Copying latest artifacts to data directory..."
          
          mkdir -p data
          
          # Copy scored_runs.csv if available
          if [ -f downloaded-scored-data/scored_runs.csv ]; then
            cp downloaded-scored-data/scored_runs.csv data/scored_runs.csv
            echo "Copied scored_runs.csv"
          fi
          
          # Copy anomalies chart if available
          if [ -f downloaded-scored-data/anomalies.png ]; then
            cp downloaded-scored-data/anomalies.png data/anomalies.png
            echo "Copied anomalies.png"
          fi
          
          # Copy metrics database (merge) if available
          if [ -f downloaded-data/metrics.db ]; then
            cp downloaded-data/metrics.db data/metrics.db
            echo "Copied metrics.db from full-dashboard-data"
          elif [ -f downloaded-metrics-db/metrics.db ]; then
            cp downloaded-metrics-db/metrics.db data/metrics.db
            echo "Copied metrics.db from metrics-db artifact"
          fi
          
          # Copy workflow runs CSV backup if available
          if [ -f downloaded-data/workflow_runs_data.csv ]; then
            cp downloaded-data/workflow_runs_data.csv data/workflow_runs_data.csv
          fi

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if there are changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No data changes to commit."
            exit 0
          fi
          
          git add data/
          git commit -m "🔄 Auto-update dashboard data from workflow run ${{ github.event.workflow_run.id }}" || echo "Nothing to commit"
          
          # Push only if we're on main branch
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            git push || echo "Push failed - this may be expected if running in a fork or with limited permissions"
          fi