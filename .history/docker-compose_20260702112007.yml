services:
  api:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Mount local data directory to container for persistent storage
      - ./data:/app/data:rw
      # Sync application code for development (hot reload on code changes)
      - .:/app
    environment:
      # Optional: Configure GitHub token and repo for auto-refresh
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-azizwhibi/ci-cd-ai-anomaly}
    restart: unless-stopped