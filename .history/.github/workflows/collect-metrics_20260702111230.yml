# .github/workflows/collect-metrics.yml
name: Collect Synthetic Metrics

on:
  workflow_dispatch: # Allows you to run this manually from the UI
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours automatically

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas numpy joblib scikit-learn matplotlib

      # This step simulates build data and saves it as an artifact
      - name: Generate synthetic metrics
        id: generate-data
        run: |
          mkdir -p artifacts
          python << 'EOF'
          import csv, os, random, time

          status = random.choice(['success', 'success', 'failed'])
          duration = random.choice([35, 42, 145, 170]) # Mix of normal and slow builds
          failed_tests = 0 if status == 'success' else random.randint(1, 5)

          row = {
              'run_id': int(time.time()),
              'branch': os.environ.get('GITHUB_REF_NAME', 'main'),
              'status': status,
              'duration_seconds': duration,
              'failed_tests': failed_tests,
              'created_at': time.strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          file = 'artifacts/synthetic_metrics.csv'
          exists = os.path.exists(file)

          with open(file, 'a', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=row.keys())
              if not exists:
                  writer.writeheader()
              writer.writerow(row)
          
          print(f"Generated metrics for {status} build in {duration}s")
          EOF

      - name: Upload synthetic metrics CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-metrics
          path: artifacts/synthetic_metrics.csv

      - name: Merge synthetic metrics into database and generate dashboard data
        run: |
          python << 'PYEOF'
          import csv
          import sqlite3
          import pandas as pd
          import numpy as np
          import joblib
          import os
          from datetime import datetime

          # Create a temporary database to merge with
          db_path = "data/metrics.db"
          os.makedirs("data", exist_ok=True)
          
          conn = sqlite3.connect(db_path)
          
          # Load synthetic metrics CSV
          csv_file = 'artifacts/synthetic_metrics.csv'
          df_synthetic = pd.read_csv(csv_file)
          
          # Standardize columns to match workflow_runs schema
          rename_map = {
              'status': 'conclusion',
              'branch': 'name'  # Use branch as the run name for simplicity
          }
          df_synthetic = df_synthetic.rename(columns=rename_map)
          df_synthetic['run_id'] = df_synthetic['run_id'].astype(int)
          df_synthetic['created_at'] = pd.to_datetime(df_synthetic['created_at'], utc=True).isoformat()
          df_synthetic['event'] = 'schedule'
          df_synthetic['html_url'] = f"https://github.com/azizwhibi/ci-cd-ai-anomaly/actions/runs/{df_synthetic['run_id'].astype(str)}"
          
          # Add duration_log feature
          df_synthetic['duration_log'] = np.log1p(df_synthetic['duration_seconds'])
          
          # Create table if not exists
          cursor = conn.cursor()
          cursor.execute("""
              CREATE TABLE IF NOT EXISTS workflow_runs (
                  run_id INTEGER PRIMARY KEY,
                  name TEXT,
                  status TEXT,
                  conclusion TEXT,
                  event TEXT,
                  branch TEXT,
                  created_at TEXT,
                  duration_seconds INTEGER,
                  html_url TEXT,
                  test_count INTEGER DEFAULT 0,
                  failed_tests INTEGER DEFAULT 0,
                  duration_log REAL
              )
          """)
          
          # Insert synthetic data (ignore duplicates by run_id)
          for _, row in df_synthetic.iterrows():
              cursor.execute("""
                  INSERT OR IGNORE INTO workflow_runs 
                  (run_id, name, status, conclusion, event, branch, created_at, duration_seconds, html_url, test_count, failed_tests)
                  VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
              """, (
                  int(row['run_id']), row.get('name', 'Synthetic Metrics'), 
                  str(row['status']), str(row['conclusion']), str(row.get('event', 'schedule')),
                  str(row.get('branch', 'main')), str(row['created_at']), 
                  int(row['duration_seconds']), str(row['html_url']),
                  int(row.get('test_count', 0)), int(row.get('failed_tests', 0))
              ))
          
          conn.commit()
          conn.close()
          
          print(f"Merged synthetic metrics into {db_path}")
          
          # Now train model and generate scored_runs.csv for the dashboard
          query = "SELECT * FROM workflow_runs"
          df_all = pd.read_sql(query, sqlite3.connect(db_path))
          
          if len(df_all) > 1:
              df_all["is_failed"] = df_all["conclusion"].map({"success": 0, "failure": 1}).fillna(0).astype(int)
              df_all["created_at_parsed"] = pd.to_datetime(df_all["created_at"], utc=True)
              df_all["build_hour"] = df_all["created_at_parsed"].dt.hour
              df_all["duration_log_feat"] = np.log1p(df_all["duration_seconds"])
              
              features = ["duration_seconds", "is_failed", "build_hour", "duration_log_feat"]
              X = df_all[features]
              
              # Load or create model
              model_path = "data/model.joblib"
              # Always retrain model on fresh data for accuracy
              from sklearn.ensemble import IsolationForest
              model = IsolationForest(n_estimators=100, contamination=0.1, random_state=42)
              model.fit(X)
              
              joblib.dump(model, model_path)
              
              joblib.dump(model, model_path)
              
              df_all["anomaly_label"] = model.predict(X)
              df_all["anomaly_score"] = model.decision_function(X)
          else:
              print("Not enough data for anomaly detection. Adding default scores.")
              df_all["anomaly_label"] = 1
              df_all["anomaly_score"] = 0.0

          # Save to CSV 
          output_path = "data/scored_runs.csv"
          df_all.to_csv(output_path, index=False)
          print(f"Saved scored runs to {output_path}")
          
          # Also update the CSV from database for direct use by dashboard as backup
          csv_backup = "data/workflow_runs_data.csv"
          df_all[["run_id", "name", "status", "conclusion", "event", "branch", "created_at", 
                   "duration_seconds", "anomaly_label", "anomaly_score", "html_url"]].to_csv(csv_backup, index=False)
          print(f"Saved backup CSV to {csv_backup}")
          PYEOF

      - name: Upload merged dashboard data artifact (with fresh metrics + synthetic)
        uses: actions/upload-artifact@v4
        with:
          name: full-dashboard-data
          path: |
            data/scored_runs.csv
            data/metrics.db