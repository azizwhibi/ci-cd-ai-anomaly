# .github/workflows/detect-anomalies.yml
name: Detect CI Anomalies

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:
  detect-ai:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib requests numpy matplotlib

      - name: Fetch latest metrics from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: azizwhibi/ci-cd-anomaly
        run: python scripts/fetch_metrics.py

      - name: Train model on all fetched data
        id: train-model
        run: |
          echo "Training/retraining model on all fetched data..."
          python scripts/train_model.py || true

      - name: Detect Anomalies in Latest Run
        id: detection
        run: |
          if [ ! -f data/model.joblib ]; then
            echo "Model training failed or produced no model. Skipping anomaly detection."
            exit 0
          fi
          python scripts/detect_latest_run.py || true

      - name: Handle Anomaly Warning
        if: always()
        run: |
          python << 'EOF'
          import json
          try:
              with open('data/latest_detection.json') as f:
                  res = json.load(f)
              
              if res.get('is_anomaly'):
                  print(f"::error title=Anomaly Detected::CI Run {res['run_id']} is anomalous (Score: {res['anomaly_score']:.4f})")
              else:
                  print("Latest run appears normal.")
          except FileNotFoundError:
              print("Detection file not found, skipping warning.")
          EOF

      - name: Commit and push updated dashboard data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if there are changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No data changes to commit."
            exit 0
          fi
          
          git add data/
          git commit -m "🔄 Auto-update dashboard data from workflow run ${{ github.event.workflow_run.id }}" || echo "Nothing to commit"
          
          # Push only if we're on main branch
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            git push || echo "Push failed - this may be expected if running in a fork or with limited permissions"
          fi