services:
  # Production service with Gunicorn WSGI server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ci-cd-anomaly-prod
    ports:
      - "8000:8000"
    volumes:
      # Mount local data directory for persistent storage
      - ./data:/app/data:rw
    environment:
      # Gunicorn configuration
      - PORT=8000
      # Optional: Configure GitHub token and repo for auto-refresh
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-azizwhibi/ci-cd-ai-anomaly}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Production optimization: increase memory limit if needed
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G

  # Development service with auto-reload (Flask dev server)
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ci-cd-anomaly-dev
    ports:
      - "8001:8000"
    volumes:
      # Mount local data directory for persistent storage
      - ./data:/app/data:rw
      # Sync application code for development (hot reload on code changes)
      - .:/app
    environment:
      # Development mode settings
      - FLASK_ENV=development
      - PORT=8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-azizwhibi/ci-cd-ai-anomaly}
    restart: unless-stopped
    # Override CMD for development with Flask's auto-reload
    command: python app/main.py
