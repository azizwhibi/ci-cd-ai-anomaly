<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --blue: #3b82f6;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 2rem; background: var(--bg); color: var(--text); }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { margin: 0; font-size: 1.5rem; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 0.5rem; color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 2rem; font-weight: bold; }
        
        /* Chart */
        .chart-container { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; text-align: center; }
        img { max-width: 100%; height: auto; border-radius: 8px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: var(--muted); font-weight: 600; }

        /* Status Badges */
        .badge { padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.85rem; font-weight: bold; }
        .badge.success { background: rgba(16, 185, 129, 0.2); color: var(--green); }
        .badge.failure { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        .badge.anomaly { background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid #fbbf24; }

        /* Status indicator */
        #refresh-status {
            font-size: 0.85rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #refresh-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--muted);
            display: inline-block;
        }
        #refresh-status .dot.live { background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Refresh button */
        #refresh-btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        #refresh-btn:hover { background: #2563eb; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid var(--muted);
            border-top-color: var(--blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
        .empty-state p { font-size: 1.1rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>AIOps Anomaly Dashboard</h1>
        <div style="display:flex; align-items:center; gap:1rem;">
            <span id="refresh-status"><span class="dot live" id="status-dot"></span><span id="last-updated">Loading...</span></span>
            <button id="refresh-btn" onclick="loadDashboardData()">Refresh Now</button>
        </div>
    </header>

    <!-- Summary Cards -->
    <div class="stats-grid" id="stats-cards">
        <div class="card">
            <h3>Total Runs</h3>
            <div class="value" id="stat-total">-</div>
        </div>
        <div class="card">
            <h3>Failed Builds</h3>
            <div class="value" style="color: var(--red);" id="stat-failed">-</div>
        </div>
        <div class="card">
            <h3>Anomalies Detected</h3>
            <div class="value" style="color: #fbbf24;" id="stat-anomalies">-</div>
        </div>
        <div class="card">
            <h3>Avg Duration</h3>
            <div class="value" id="stat-avg-duration">-s</div>
        </div>
    </div>

    <!-- Visualization -->
    <div class="chart-container" id="chart-section" style="display:none;">
        <h2>Anomaly Distribution</h2>
        <img id="chart-img" src="" alt="Anomaly Chart">
    </div>

    <!-- Data Table -->
    <table id="metrics-table">
        <thead>
            <tr>
                <th>Run ID</th>
                <th>Status</th>
                <th>Name / Branch</th>
                <th>Duration (s)</th>
                <th>Anomaly Label</th>
                <th>Score</th>
                <th>Created At</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="7" style="text-align:center;">Loading data...</td></tr>
        </tbody>
    </table>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <script>
        const API_URL = '/api/metrics';
        let refreshInterval = null;
        const REFRESH_PERIOD = 60000; // 1 minute

        function showLoading() { document.getElementById('loading').classList.add('active'); }
        function hideLoading() { document.getElementById('loading').classList.remove('active'); }
        function setLoadingText(text) { document.getElementById('last-updated').textContent = text; }

        async function fetchMetrics() {
            try {
                const response = await fetch(API_URL + '?t=' + Date.now()); // Cache busting
                if (!response.ok) throw new Error('No data available');
                return await response.json();
            } catch (err) {
                console.error('Failed to fetch metrics:', err);
                return null;
            }
        }

        function formatScore(score) {
            if (score === undefined || score === null) return 'N/A';
            return typeof score === 'number' ? score.toFixed(4) : String(score);
        }

        function renderTable(rows, stats, chartPath) {
            const tbody = document.getElementById('table-body');
            
            // Update stats cards
            if (stats) {
                document.getElementById('stat-total').textContent = stats.total || 0;
                document.getElementById('stat-failed').textContent = stats.failed || 0;
                document.getElementById('stat-anomalies').textContent = stats.anomalies || 0;
                document.getElementById('stat-avg-duration').textContent = (stats.avg_duration || 0) + 's';
            }

            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No data available. Run CI pipeline or trigger Collect Metrics workflow.</td></tr>';
                document.getElementById('chart-section').style.display = 'none';
                return;
            }

            // Update chart if available
            if (chartPath) {
                const chartSection = document.getElementById('chart-section');
                const chartImg = document.getElementById('chart-img');
                chartImg.src = chartPath;
                chartSection.style.display = 'block';
            } else {
                document.getElementById('chart-section').style.display = 'none';
            }

            // Render table rows
            let html = '';
            for (const row of rows) {
                const status = row.conclusion || row.status || 'unknown';
                const statusClass = status === 'failure' ? 'failure' : 'success';
                const statusText = status === 'failure' ? 'Failed' : (status === 'success' ? 'Success' : status);

                let anomalyLabel = '';
                if (row.anomaly_label !== undefined && row.anomaly_label !== null) {
                    const isAnomaly = typeof row.anomaly_label === 'string' 
                        ? (row.anomaly_label === '-1' || parseInt(row.anomaly_label) === -1)
                        : (parseInt(row.anomaly_label) === -1);
                    if (isAnomaly) {
                        anomalyLabel = '<span class="badge anomaly">Anomalous</span>';
                    } else {
                        anomalyLabel = 'Normal';
                    }
                } else {
                    anomalyLabel = 'N/A';
                }

                const nameBranch = row.name || row.branch || '-';
                const createdAt = row.created_at ? new Date(row.created_at).toLocaleString() : '-';

                html += `<tr>
                    <td>${row.run_id || '-'}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td style="font-size:0.85rem;">${nameBranch}</td>
                    <td>${row.duration_seconds || '-'}</td>
                    <td>${anomalyLabel}</td>
                    <td style="font-family:monospace;">${formatScore(row.anomaly_score)}</td>
                    <td style="font-size:0.85rem;">${createdAt}</td>
                </tr>`;
            }
            tbody.innerHTML = html;

            // Update last updated timestamp
            if (stats && stats.last_updated) {
                const date = new Date(stats.last_updated);
                setLoadingText('Updated ' + date.toLocaleTimeString());
            }
        }

        async function loadDashboardData() {
            showLoading();
            try {
                
                const chartPath = '/static/anomalies.png'; // Keep static path for now
                console.log('Chart path:', chartPath);
                const data = await fetchMetrics();
                
               
                
                if (data && data.records) {
                    renderTable(data.records, data.stats, null); // Don't use server-side chart_path from API since it's None due to static route
                    
                        document.getElementById('chart-section').style.display = 'block';
                
                    document.getElementById('chart-img').src = '/static/anomalies.png';
                    
                } else {
                    renderTable([], data?.stats || {}, null);
                }
            } catch (err) {
                console.error('Dashboard load error:', err);
                setLoadingText('Failed to load');
            } finally {
                hideLoading();
            }
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboardData();
            
            // Auto-refresh every 60 seconds
            refreshInterval = setInterval(() => {
                console.log('Auto-refreshing metrics...');
                
                            loadDashboardData();
                
            }, REFRESH_PERIOD);
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
