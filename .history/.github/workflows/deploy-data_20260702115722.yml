# .github/workflows/deploy-data.yml
name: Deploy Dashboard Data

on:
  workflow_run:
    workflows: ["Collect Synthetic Metrics", "Detect CI Anomalies"]
    types: [completed]
    branches: [main]

jobs:
  deploy-data:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download scored dashboard data artifact
        uses: actions/download-artifact@v4
        with:
          name: scored-dashboard-data
          path: downloaded-scored-data
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download metrics database artifact (from full-dashboard-data)
        uses: actions/download-artifact@v4
        with:
          name: full-dashboard-data
          path: downloaded-full-data
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download metrics-db artifact separately
        uses: actions/download-artifact@v4
        with:
          name: metrics-db
          path: downloaded-metrics-db
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download anomaly report
        uses: actions/download-artifact@v4
        with:
          name: anomaly-report
          path: downloaded-anomaly-report
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Copy latest data to correct locations
        run: |
          echo "Copying latest artifacts to data directory..."
          
          mkdir -p data
          
          # Copy scored_runs.csv if available
          if [ -f downloaded-scored-data/scored_runs.csv ]; then
            cp downloaded-scored-data/scored_runs.csv data/scored_runs.csv
            echo "Copied scored_runs.csv"
          fi
          
          # Copy anomalies chart if available
          if [ -f downloaded-scored-data/anomalies.png ]; then
            cp downloaded-scored-data/anomalies.png data/anomalies.png
            echo "Copied anomalies.png"
          fi
          
          # Copy model if available
          if [ -f downloaded-scored-data/model.joblib ]; then
            cp downloaded-scored-data/model.joblib data/model.joblib
            echo "Copied model.joblib"
          fi
          
          # Copy metrics database 
          for dir in downloaded-full-data downloaded-metrics-db; do
            if [ -f "$dir/metrics.db" ]; then
              cp "$dir/metrics.db" data/metrics.db
              echo "Copied metrics.db from $dir"
              break
            fi
          done

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if there are changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No data changes to commit."
            exit 0
          fi
          
          git add data/
          git commit -m "🔄 Auto-update dashboard data from workflow run ${{ github.event.workflow_run.id }}" || echo "Nothing to commit"
          
          # Push only if we're on main branch
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            git push || echo "Push failed - this may be expected if running in a fork or with limited permissions"
          fi