# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    timeout-minutes: 10 # Stop the job if it hangs for more than 10 mins
    
    # Fix for memory issues during Docker build
    env:
      DOCKER_BUILDKIT: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Fix for ModuleNotFoundError by adding current dir to Python path
      - name: Run Tests with PYTHONPATH
        env:
          PYTHONPATH: .
        run: pytest -v tests/test_app.py

      - name: Build Docker Image
        run: docker build -t anomaly-detector:${{ github.sha }} .