# .github/workflows/deploy-data.yml
name: Deploy Dashboard Data
description: "Syncs latest dashboard data from local data/ folder to main branch for persistence"

on:
  # Manual trigger only - runs a sync from the working directory
  workflow_dispatch:
  schedule:
    # Once per day at midnight UTC
    - cron: '0 0 * * *'

jobs:
  deploy-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This workflow is kept minimal. Data persistence is now handled by 
      # the Detect CI Anomalies workflow which commits data directly.
      # Use this only for manual syncs or scheduled re-pushes if needed.
      
      - name: Check for data changes
        run: |
          echo "Checking for any uncommitted data changes..."
          if [ -z "$(git status --porcelain)" ]; then
            echo "No uncommitted changes. Repository is in sync."
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add data/
            git commit -m "🔄 Scheduled data sync from workflow dispatch" || echo "Nothing to commit"
            git push || echo "Push failed or nothing pushed"
          fi