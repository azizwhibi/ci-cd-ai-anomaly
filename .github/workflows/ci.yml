# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Get the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python 3.10 (matching your Vagrant VM)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies from our requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run the tests we wrote in Week 2
      - name: Run Tests
        run: pytest -v tests/test_app.py

      # 5. Build the Docker image to ensure it doesn't break
      - name: Build Docker Image
        run: docker build -t anomaly-detector:${{ github.sha }} .
