# .github/workflows/detect-anomalies.yml
name: Detect CI Anomalies

on:
  workflow_run:
    workflows: ["CI Pipeline"] # Triggers after your Week 3 workflow finishes
    types: [completed]

jobs:
  detect-ai:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib requests numpy matplotlib

      - name: Fetch latest metrics from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: azizwhibi/ci-cd-anomaly
        run: python scripts/fetch_metrics.py

      - name: Train model on all fetched data (retrain even if empty, generates fresh scored runs)
        id: train-model
        run: |
          echo "Training/retraining model on all fetched data..."
          
          # The script will error out of the code if no data is found. We can continue 
          python scripts/train_model.py || true

      - name: Detect Anomalies in Latest Run
        id: detection
        run: |
          # Only attempt if we have a model file; otherwise skip detection step 78|
          if [ ! -f data/model.joblib ]; then
            echo "Model training failed or produced no model. Skipping anomaly detection." 81|
            exit 0
          fi
          
          python scripts/detect_latest_run.py || true

      - name: Upload Detection Report
        uses: actions/upload-artifact@v4
        if: env.DETECTED_IS_ANOMALY == 'true'
        with:
          name: anomaly-report
          path: data/latest_detection.json

      - name: Handle Anomaly Warning
        if: always()
        run: |
          python << 'EOF'
          import json
          try:
              with open('data/latest_detection.json') as f:
                  res = json.load(f)
              
              if res.get('is_anomaly'):
                  print(f"::error title=Anomaly Detected::CI Run {res['run_id']} is anomalous (Score: {res['anomaly_score']:.4f})")
              else:
                  print("Latest run appears normal.")
          except FileNotFoundError:
              print("Detection file not found, skipping warning.")
          EOF

      - name: Upload scored dashboard data artifact
        uses: actions/upload-artifact@v4
        with:
          name: scored-dashboard-data
          path: |
            data/scored_runs.csv
            data/anomalies.png
          if-no-files-found: warn